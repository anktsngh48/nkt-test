<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NKT JustSay</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Sora:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #05080f;
      --card: #111827;
      --accent: #00e5ff;
      --accent2: #7b61ff;
      --text: #e8f0fe;
      --muted: #5a6a82;
      --danger: #ff4f6a;
      --success: #00e5a0;
      --border: rgba(0,229,255,0.12);
    }

    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Sora', sans-serif; overflow-x: hidden; }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 20% 10%, rgba(0,229,255,0.05) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 80% 80%, rgba(123,97,255,0.06) 0%, transparent 60%);
      pointer-events: none; z-index: 0;
    }

    /* ── FULLSCREEN BAR ── */
    #fs-bar {
      position: relative; z-index: 20; width: 100%;
      text-align: center; padding: 7px 20px;
      font-family: 'Orbitron', sans-serif; font-size: 0.65rem;
      font-weight: 700; letter-spacing: 0.22em; text-transform: uppercase;
      color: var(--accent); background: rgba(0,229,255,0.035);
      border-bottom: 1px solid rgba(0,229,255,0.09);
      cursor: pointer; transition: background 0.2s; user-select: none;
    }
    #fs-bar:hover { background: rgba(0,229,255,0.08); }
    #fs-bar.hidden { display: none; }

    /* ── HEADER ── */
    header {
      position: relative; z-index: 10;
      text-align: center; padding: 20px 20px 12px;
      border-bottom: 1px solid rgba(0,229,255,0.08);
    }
    header h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(1.5rem, 5vw, 2.2rem); font-weight: 900; letter-spacing: 0.12em;
      background: linear-gradient(135deg, #00e5ff 0%, #7b61ff 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      filter: drop-shadow(0 0 18px rgba(0,229,255,0.4));
    }
    header p { font-size: 0.72rem; color: var(--muted); letter-spacing: 0.2em; text-transform: uppercase; margin-top: 3px; }

    /* ── ACTIVATE OVERLAY ── */
    #activate-screen {
      position: fixed; inset: 0; z-index: 100; background: var(--bg);
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 24px;
      transition: opacity 0.5s ease;
    }
    #activate-screen.hidden { opacity: 0; pointer-events: none; }
    .activate-logo {
      font-family: 'Orbitron', sans-serif; font-size: clamp(2rem, 8vw, 3.5rem);
      font-weight: 900;
      background: linear-gradient(135deg, #00e5ff 0%, #7b61ff 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      filter: drop-shadow(0 0 25px rgba(0,229,255,0.5));
      animation: pulse-glow 2.5s ease-in-out infinite;
    }
    @keyframes pulse-glow {
      0%,100% { filter: drop-shadow(0 0 25px rgba(0,229,255,0.5)); }
      50%      { filter: drop-shadow(0 0 40px rgba(0,229,255,0.9)); }
    }
    .activate-sub { color: var(--muted); font-size: 0.9rem; letter-spacing: 0.08em; }
    .firefox-note {
      position: absolute; bottom: 24px; left: 0; right: 0;
      text-align: center; font-size: 0.7rem; color: rgba(0,229,255,0.28); letter-spacing: 0.05em;
    }
    #tap-btn {
      position: relative; background: transparent;
      border: 2px solid var(--accent); color: var(--accent);
      font-family: 'Orbitron', sans-serif; font-size: 0.9rem; font-weight: 700;
      letter-spacing: 0.15em; padding: 16px 44px; border-radius: 60px;
      cursor: pointer; transition: all 0.25s ease; overflow: hidden;
    }
    #tap-btn::before { content: ''; position: absolute; inset: 0; background: var(--accent); opacity: 0; transition: opacity 0.25s; }
    #tap-btn:hover { box-shadow: 0 0 40px rgba(0,229,255,0.4); color: var(--bg); }
    #tap-btn:hover::before { opacity: 1; }
    #tap-btn span { position: relative; z-index: 1; }

    /* ── MAIN ── */
    #main {
      position: relative; z-index: 1;
      max-width: 860px; margin: 0 auto;
      padding: 20px 16px 40px;
      display: flex; flex-direction: column; align-items: center; gap: 20px;
    }

    /* ── PLAYER ── */
    #player-box {
      width: 100%; display: none;
      border-radius: 14px; overflow: hidden;
      background: #000; aspect-ratio: 16/9;
      border: 1px solid var(--border);
      box-shadow: 0 0 50px rgba(0,229,255,0.13), 0 0 100px rgba(123,97,255,0.09);
    }
    #player-box.active { display: block; }
    #player-box iframe { width: 100%; height: 100%; border: none; display: block; }

    #now-playing {
      font-size: 0.8rem; color: var(--accent); letter-spacing: 0.04em;
      min-height: 1.2em; text-align: center; max-width: 100%;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap; padding: 0 12px;
      opacity: 0; transition: opacity 0.4s;
    }
    #now-playing.visible { opacity: 1; }

    /* ── MIC + SEARCH ROW ── */
    .search-row {
      display: flex; align-items: center; gap: 12px; width: 100%;
    }

    #mic-btn {
      position: relative; flex-shrink: 0;
      width: 54px; height: 54px; border-radius: 50%;
      border: 2px solid rgba(0,229,255,0.3); cursor: pointer;
      background: linear-gradient(145deg, #00e5ff18, #7b61ff18);
      transition: all 0.3s; display: flex; align-items: center; justify-content: center;
    }
    #mic-btn:hover { border-color: var(--accent); box-shadow: 0 0 20px rgba(0,229,255,0.3); }
    #mic-btn.listening {
      border-color: var(--danger);
      background: linear-gradient(145deg, #ff4f6a22, #ff4f6a11);
      animation: mic-pulse 1s ease-in-out infinite;
    }
    @keyframes mic-pulse {
      0%,100% { box-shadow: 0 0 0 0    rgba(255,79,106,0.5); }
      50%      { box-shadow: 0 0 0 16px rgba(255,79,106,0);   }
    }
    #mic-btn .ring {
      position: absolute; inset: -6px; border-radius: 50%;
      border: 2px solid var(--danger); opacity: 0;
    }
    #mic-btn.listening .ring:nth-child(1) { animation: ring-out 1.4s ease-out 0s   infinite; }
    #mic-btn.listening .ring:nth-child(2) { animation: ring-out 1.4s ease-out 0.4s infinite; }
    #mic-btn.listening .ring:nth-child(3) { animation: ring-out 1.4s ease-out 0.8s infinite; }
    @keyframes ring-out {
      0%   { inset: -3px;  opacity: 0.6; }
      100% { inset: -22px; opacity: 0;   }
    }

    #search-input {
      flex: 1; background: var(--card);
      border: 1px solid var(--border); border-radius: 10px;
      padding: 13px 16px; color: var(--text);
      font-family: 'Sora', sans-serif; font-size: 0.92rem;
      outline: none; transition: border-color 0.2s;
    }
    #search-input:focus { border-color: rgba(0,229,255,0.4); }
    #search-input::placeholder { color: var(--muted); }

    #search-btn {
      flex-shrink: 0; padding: 13px 22px;
      background: rgba(0,229,255,0.08); border: 1px solid rgba(0,229,255,0.25);
      border-radius: 10px; color: var(--accent);
      font-family: 'Orbitron', sans-serif; font-size: 0.7rem;
      font-weight: 700; letter-spacing: 0.12em; cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
    }
    #search-btn:hover { background: rgba(0,229,255,0.16); border-color: var(--accent); }

    /* ── STATUS ── */
    #status {
      font-size: 0.78rem; color: var(--muted); letter-spacing: 0.08em;
      min-height: 1.1em; text-align: center; transition: color 0.3s;
    }
    #status.listening { color: var(--danger);  }
    #status.searching { color: var(--accent2); }
    #status.playing   { color: var(--success); }
    #status.error     { color: var(--danger);  }

    /* ── RESULTS LIST ── */
    #results {
      width: 100%; display: flex; flex-direction: column; gap: 8px;
    }

    .result-item {
      display: flex; align-items: center; gap: 12px;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 10px; padding: 10px 14px;
      cursor: pointer; transition: border-color 0.2s, background 0.2s;
    }
    .result-item:hover {
      border-color: rgba(0,229,255,0.35);
      background: rgba(0,229,255,0.04);
    }
    .result-item:hover .play-icon { opacity: 1; }

    .result-thumb {
      flex-shrink: 0; width: 80px; height: 45px;
      border-radius: 6px; object-fit: cover;
      background: #000;
    }

    .result-info { flex: 1; overflow: hidden; }
    .result-title {
      font-size: 0.82rem; font-weight: 500; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .result-meta { font-size: 0.7rem; color: var(--muted); margin-top: 3px; }

    .play-icon {
      flex-shrink: 0; color: var(--accent); opacity: 0.4;
      transition: opacity 0.2s;
    }

    /* ── WAVEFORM (shown while listening) ── */
    #waveform {
      display: flex; align-items: center; gap: 3px; height: 24px;
      opacity: 0; transition: opacity 0.3s;
    }
    #waveform.active { opacity: 1; }
    #waveform .bar { width: 3px; border-radius: 2px; background: var(--danger); }
    #waveform.active .bar { animation: wave-bounce 0.8s ease-in-out infinite alternate; }
    #waveform .bar:nth-child(1) { animation-delay: 0s;    }
    #waveform .bar:nth-child(2) { animation-delay: 0.1s;  }
    #waveform .bar:nth-child(3) { animation-delay: 0.2s;  }
    #waveform .bar:nth-child(4) { animation-delay: 0.05s; }
    #waveform .bar:nth-child(5) { animation-delay: 0.15s; }
    @keyframes wave-bounce { from { height: 3px; } to { height: 20px; } }

    @media (max-width: 480px) {
      #player-box { border-radius: 10px; }
      .result-thumb { width: 64px; height: 36px; }
    }
  </style>
</head>
<body>

  <!-- FULLSCREEN BAR -->
  <div id="fs-bar" onclick="enterFullscreen()">⛶ &nbsp;GO FULLSCREEN</div>

  <!-- ACTIVATE OVERLAY -->
  <div id="activate-screen">
    <div class="activate-logo">NKT JustSay</div>
    <p class="activate-sub">Voice → Song → Instant Play</p>
    <button id="tap-btn" onclick="activateSession()"><span>▶ &nbsp;LET ME IN</span></button>
    <p class="firefox-note">Couldn't make it work on Firefox. Apologies.</p>
  </div>

  <!-- HEADER -->
  <header>
    <h1>NKT JustSay</h1>
    <p>Say a song · It plays</p>
  </header>

  <!-- MAIN -->
  <div id="main">

    <!-- Player -->
    <div id="player-box"></div>
    <div id="now-playing"></div>

    <!-- Mic + Search -->
    <div class="search-row">
      <button id="mic-btn" onclick="toggleListen()" title="Speak a song name">
        <div class="ring"></div><div class="ring"></div><div class="ring"></div>
        <svg id="mic-icon" width="22" height="22" viewBox="0 0 24 24" fill="none">
          <rect x="9" y="2" width="6" height="11" rx="3" fill="#00e5ff"/>
          <path d="M5 10a7 7 0 0 0 14 0" stroke="#00e5ff" stroke-width="2" stroke-linecap="round"/>
          <line x1="12" y1="17" x2="12" y2="21" stroke="#00e5ff" stroke-width="2" stroke-linecap="round"/>
          <line x1="9" y1="21" x2="15" y2="21" stroke="#00e5ff" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </button>
      <input id="search-input" type="text" placeholder="Say or type a song name…"
             onkeydown="if(event.key==='Enter') doSearch()" />
      <button id="search-btn" onclick="doSearch()">SEARCH</button>
    </div>

    <!-- Waveform + status -->
    <div id="waveform">
      <div class="bar"></div><div class="bar"></div><div class="bar"></div>
      <div class="bar"></div><div class="bar"></div>
    </div>
    <div id="status">Press mic or type, then hit Search</div>

    <!-- Results list -->
    <div id="results"></div>

  </div>

  <script>
    // ─────────────────────────────────────────────────────────────────────────
    //  SEARCH  : Piped API (open YouTube frontend, CORS-enabled, no key needed)
    //            10 instances fired in parallel — fastest response wins
    //  PLAYBACK: youtube.com/embed/VIDEO_ID?autoplay=1  (standard embed, always works)
    // ─────────────────────────────────────────────────────────────────────────

    const PIPED = [
      'https://pipedapi.kavin.rocks',
      'https://pipedapi.adminforge.de',
      'https://api.piped.projectsegfau.lt',
      'https://piped-api.garudalinux.org',
      'https://watchapi.whatever.social',
      'https://api.piped.yt',
      'https://piped.video/api',
      'https://pipedapi.in.projectsegfau.lt',
      'https://pipedapi.drgns.space',
      'https://piped-api.privacy.com.de',
    ];

    let sessionActive = false;
    let recognition   = null;
    let isListening   = false;

    // ── SESSION ──────────────────────────────────────────────────────────────
    function activateSession() {
      sessionActive = true;
      const s = document.getElementById('activate-screen');
      s.classList.add('hidden');
      setTimeout(() => s.style.display = 'none', 500);
    }

    // ── SPEECH RECOGNITION ───────────────────────────────────────────────────
    function setupRecognition() {
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SR) { setStatus('Voice not supported in Firefox — use Chrome or Edge', 'error'); return null; }

      const r = new SR();
      r.lang = 'en-US'; r.continuous = false; r.interimResults = true; r.maxAlternatives = 1;

      r.onstart = () => {
        isListening = true; setMicState(true);
        setStatus('Listening…', 'listening');
      };
      r.onresult = (e) => {
        const interim = Array.from(e.results).map(x => x[0].transcript).join('');
        document.getElementById('search-input').value = interim;
        if (e.results[e.results.length - 1].isFinal) {
          const q = e.results[e.results.length - 1][0].transcript.trim();
          document.getElementById('search-input').value = q;
          doSearch();   // auto-search as soon as speech is final
        }
      };
      r.onerror = (e) => {
        isListening = false; setMicState(false);
        const msgs = { 'no-speech': 'No speech — try again', 'not-allowed': 'Mic blocked — allow in browser settings', 'network': 'Network error' };
        setStatus(msgs[e.error] || `Mic error: ${e.error}`, 'error');
      };
      r.onend = () => { isListening = false; setMicState(false); };
      return r;
    }

    function toggleListen() {
      if (!sessionActive) return;
      if (isListening) { recognition && recognition.stop(); return; }
      recognition = setupRecognition();
      if (!recognition) return;
      try { recognition.start(); }
      catch (err) { setStatus('Could not start mic: ' + err.message, 'error'); }
    }

    // ── SEARCH ───────────────────────────────────────────────────────────────
    async function doSearch() {
      const q = document.getElementById('search-input').value.trim();
      if (!q) return;
      setStatus('Searching…', 'searching');
      clearResults();

      try {
        const results = await searchPiped(q);
        renderResults(results);
        setStatus(`${results.length} results — tap to play`, '');
      } catch(err) {
        console.error(err);
        setStatus('Search failed — check connection', 'error');
      }
    }

    // Fire all Piped instances in parallel, take first successful response
    async function searchPiped(query) {
      const path = `/search?q=${encodeURIComponent(query)}&filter=music_songs`;

      const attempt = (base) => new Promise(async (resolve, reject) => {
        try {
          const ctrl = new AbortController();
          const timer = setTimeout(() => ctrl.abort(), 8000);
          const res = await fetch(base + path, { signal: ctrl.signal });
          clearTimeout(timer);
          if (!res.ok) { reject(new Error('HTTP ' + res.status)); return; }
          const data = await res.json();
          const items = (data.items || []).filter(i => i.url && i.url.startsWith('/watch'));
          if (!items.length) { reject(new Error('No items')); return; }
          resolve(items.slice(0, 8).map(i => ({
            videoId: i.url.replace('/watch?v=', '').split('&')[0],
            title:   i.title || 'Unknown',
            channel: i.uploaderName || '',
            thumb:   i.thumbnail || `https://i.ytimg.com/vi/${i.url.replace('/watch?v=','').split('&')[0]}/mqdefault.jpg`,
            duration: formatDuration(i.duration),
          })));
        } catch(e) { reject(e); }
      });

      // Promise.any — whichever Piped instance responds first wins
      return Promise.any(PIPED.map(base => attempt(base)));
    }

    function formatDuration(seconds) {
      if (!seconds) return '';
      const m = Math.floor(seconds / 60);
      const s = seconds % 60;
      return `${m}:${String(s).padStart(2, '0')}`;
    }

    // ── RESULTS ──────────────────────────────────────────────────────────────
    function renderResults(results) {
      const container = document.getElementById('results');
      container.innerHTML = '';

      results.forEach(r => {
        const item = document.createElement('div');
        item.className = 'result-item';
        item.innerHTML = `
          <img class="result-thumb" src="${r.thumb}" alt="" loading="lazy" onerror="this.style.display='none'"/>
          <div class="result-info">
            <div class="result-title">${escHtml(r.title)}</div>
            <div class="result-meta">${escHtml(r.channel)}${r.duration ? ' · ' + r.duration : ''}</div>
          </div>
          <svg class="play-icon" width="20" height="20" viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="1.5"/>
            <polygon points="10,8 18,12 10,16" fill="currentColor"/>
          </svg>`;
        item.onclick = () => playVideo(r.videoId, r.title);
        container.appendChild(item);
      });
    }

    function clearResults() {
      document.getElementById('results').innerHTML = '';
    }

    function escHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // ── PLAY ─────────────────────────────────────────────────────────────────
    function playVideo(videoId, title) {
      const box = document.getElementById('player-box');
      const old = box.querySelector('iframe');
      if (old) old.remove();

      // Standard youtube.com embed — works on every video, every browser
      const iframe = document.createElement('iframe');
      iframe.src   = `https://www.youtube.com/embed/${videoId}?autoplay=1&rel=0`;
      iframe.allow = 'autoplay; fullscreen; picture-in-picture';
      iframe.allowFullscreen = true;
      iframe.title = title;

      box.appendChild(iframe);
      box.classList.add('active');
      box.scrollIntoView({ behavior: 'smooth', block: 'start' });

      setStatus('Now playing', 'playing');
      const np = document.getElementById('now-playing');
      np.textContent = '▶ ' + title;
      np.classList.add('visible');
    }

    // ── FULLSCREEN ────────────────────────────────────────────────────────────
    function enterFullscreen() {
      const el = document.documentElement;
      (el.requestFullscreen || el.webkitRequestFullscreen || el.mozRequestFullScreen || el.msRequestFullscreen).call(el);
    }

    function onFSChange() {
      const inFS = !!(document.fullscreenElement || document.webkitFullscreenElement || document.mozFullScreenElement || document.msFullscreenElement);
      document.getElementById('fs-bar').classList.toggle('hidden', inFS);
    }

    ['fullscreenchange','webkitfullscreenchange','mozfullscreenchange','MSFullscreenChange']
      .forEach(ev => document.addEventListener(ev, onFSChange));

    // ── MIC UI ───────────────────────────────────────────────────────────────
    function setMicState(on) {
      const btn  = document.getElementById('mic-btn');
      const icon = document.getElementById('mic-icon');
      const wave = document.getElementById('waveform');
      if (on) {
        btn.classList.add('listening'); wave.classList.add('active');
        icon.innerHTML = `<rect x="7" y="7" width="10" height="10" rx="2" fill="#ff4f6a"/><circle cx="12" cy="12" r="10" stroke="#ff4f6a" stroke-width="2"/>`;
      } else {
        btn.classList.remove('listening'); wave.classList.remove('active');
        icon.innerHTML = `<rect x="9" y="2" width="6" height="11" rx="3" fill="#00e5ff"/>
          <path d="M5 10a7 7 0 0 0 14 0" stroke="#00e5ff" stroke-width="2" stroke-linecap="round"/>
          <line x1="12" y1="17" x2="12" y2="21" stroke="#00e5ff" stroke-width="2" stroke-linecap="round"/>
          <line x1="9" y1="21" x2="15" y2="21" stroke="#00e5ff" stroke-width="2" stroke-linecap="round"/>`;
      }
    }

    function setStatus(msg, type='') {
      const el = document.getElementById('status');
      el.textContent = msg; el.className = type;
    }

    // Space = toggle mic
    document.addEventListener('keydown', e => {
      if (e.code === 'Space' && !['INPUT','BUTTON','TEXTAREA'].includes(e.target.tagName)) {
        e.preventDefault(); toggleListen();
      }
    });
  </script>
</body>
</html>
