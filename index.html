<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NKT JustSay</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Sora:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #05080f;
      --card: #111827;
      --accent: #00e5ff;
      --accent2: #7b61ff;
      --text: #e8f0fe;
      --muted: #5a6a82;
      --danger: #ff4f6a;
      --success: #00e5a0;
      --glow: 0 0 30px rgba(0,229,255,0.35);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Sora', sans-serif;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 20% 10%, rgba(0,229,255,0.06) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 80% 80%, rgba(123,97,255,0.07) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── HEADER ── */
    header {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 28px 20px 14px;
      border-bottom: 1px solid rgba(0,229,255,0.08);
    }
    header h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(1.6rem, 5vw, 2.4rem);
      font-weight: 900;
      letter-spacing: 0.12em;
      background: linear-gradient(135deg, #00e5ff 0%, #7b61ff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 20px rgba(0,229,255,0.4));
    }
    header p {
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-top: 4px;
    }

    /* ── ACTIVATE OVERLAY ── */
    #activate-screen {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 28px;
      transition: opacity 0.5s ease;
    }
    #activate-screen.hidden { opacity: 0; pointer-events: none; }

    .activate-logo {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(2rem, 8vw, 3.5rem);
      font-weight: 900;
      background: linear-gradient(135deg, #00e5ff 0%, #7b61ff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 25px rgba(0,229,255,0.5));
      animation: pulse-glow 2.5s ease-in-out infinite;
    }
    @keyframes pulse-glow {
      0%, 100% { filter: drop-shadow(0 0 25px rgba(0,229,255,0.5)); }
      50%       { filter: drop-shadow(0 0 40px rgba(0,229,255,0.9)); }
    }
    .activate-sub { color: var(--muted); font-size: 0.9rem; letter-spacing: 0.08em; }

    #tap-btn {
      position: relative;
      background: transparent;
      border: 2px solid var(--accent);
      color: var(--accent);
      font-family: 'Orbitron', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      padding: 18px 48px;
      border-radius: 60px;
      cursor: pointer;
      transition: all 0.25s ease;
      overflow: hidden;
    }
    #tap-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--accent);
      opacity: 0;
      transition: opacity 0.25s ease;
    }
    #tap-btn:hover { box-shadow: 0 0 40px rgba(0,229,255,0.4); color: var(--bg); }
    #tap-btn:hover::before { opacity: 1; }
    #tap-btn span { position: relative; z-index: 1; }

    /* ── MAIN ── */
    #main {
      position: relative;
      z-index: 1;
      max-width: 900px;
      margin: 0 auto;
      padding: 24px 16px 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }

    /* ── VIDEO WRAP ── */
    #video-wrap {
      width: 100%;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid rgba(0,229,255,0.12);
      background: var(--card);
      aspect-ratio: 16/9;
      position: relative;
      transition: box-shadow 0.4s ease;
      display: none;
    }
    #video-wrap.active {
      display: block;
      box-shadow: 0 0 60px rgba(0,229,255,0.15), 0 0 120px rgba(123,97,255,0.1);
    }
    #video-wrap iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* ── FULLSCREEN BUTTON ── */
    #fs-btn {
      position: absolute;
      bottom: 10px;
      right: 10px;
      z-index: 20;
      width: 38px;
      height: 38px;
      border-radius: 8px;
      background: rgba(5, 8, 15, 0.75);
      border: 1px solid rgba(0,229,255,0.3);
      color: var(--accent);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.25s ease, background 0.2s ease;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }
    #video-wrap:hover #fs-btn,
    #video-wrap.touch-show #fs-btn { opacity: 1; }
    #fs-btn:hover { background: rgba(0,229,255,0.15); }
    #fs-btn svg { pointer-events: none; }

    /* Fullscreen styles */
    #video-wrap:fullscreen,
    #video-wrap:-webkit-full-screen {
      width: 100vw !important;
      height: 100vh !important;
      aspect-ratio: unset !important;
      border-radius: 0 !important;
      border: none !important;
      background: #000 !important;
    }
    #video-wrap:fullscreen iframe,
    #video-wrap:-webkit-full-screen iframe {
      width: 100% !important;
      height: 100% !important;
    }
    #video-wrap:fullscreen #fs-btn,
    #video-wrap:-webkit-full-screen #fs-btn { opacity: 1; bottom: 16px; right: 16px; }

    /* ── NOW PLAYING ── */
    #now-playing {
      font-size: 0.8rem;
      color: var(--accent);
      letter-spacing: 0.08em;
      min-height: 1.2em;
      text-align: center;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      padding: 0 16px;
      opacity: 0;
      transition: opacity 0.4s ease;
    }
    #now-playing.visible { opacity: 1; }

    /* ── CONTROLS ── */
    .controls {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      width: 100%;
    }

    #mic-btn {
      position: relative;
      width: 88px;
      height: 88px;
      border-radius: 50%;
      border: 2px solid rgba(0,229,255,0.3);
      cursor: pointer;
      background: linear-gradient(145deg, #00e5ff22, #7b61ff22);
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #mic-btn:hover { border-color: var(--accent); box-shadow: var(--glow); }
    #mic-btn.listening {
      border-color: var(--danger);
      background: linear-gradient(145deg, #ff4f6a22, #ff4f6a11);
      animation: mic-pulse 1s ease-in-out infinite;
    }
    @keyframes mic-pulse {
      0%, 100% { box-shadow: 0 0 0 0    rgba(255,79,106,0.5); }
      50%       { box-shadow: 0 0 0 20px rgba(255,79,106,0);   }
    }
    #mic-btn .ring {
      position: absolute;
      inset: -8px;
      border-radius: 50%;
      border: 2px solid var(--danger);
      opacity: 0;
    }
    #mic-btn.listening .ring:nth-child(1) { animation: ring-out 1.4s ease-out 0s   infinite; }
    #mic-btn.listening .ring:nth-child(2) { animation: ring-out 1.4s ease-out 0.4s infinite; }
    #mic-btn.listening .ring:nth-child(3) { animation: ring-out 1.4s ease-out 0.8s infinite; }
    @keyframes ring-out {
      0%   { inset: -4px;  opacity: 0.6; }
      100% { inset: -28px; opacity: 0;   }
    }
    #mic-btn svg { transition: all 0.3s ease; }

    /* WAVEFORM */
    #waveform {
      display: flex;
      align-items: center;
      gap: 4px;
      height: 32px;
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    #waveform.active { opacity: 1; }
    #waveform .bar { width: 4px; border-radius: 2px; background: var(--danger); }
    #waveform.active .bar { animation: wave-bounce 0.8s ease-in-out infinite alternate; }
    #waveform .bar:nth-child(1) { animation-delay: 0s;    }
    #waveform .bar:nth-child(2) { animation-delay: 0.1s;  }
    #waveform .bar:nth-child(3) { animation-delay: 0.2s;  }
    #waveform .bar:nth-child(4) { animation-delay: 0.05s; }
    #waveform .bar:nth-child(5) { animation-delay: 0.15s; }
    #waveform .bar:nth-child(6) { animation-delay: 0.25s; }
    #waveform .bar:nth-child(7) { animation-delay: 0s;    }
    #waveform .bar:nth-child(8) { animation-delay: 0.12s; }
    @keyframes wave-bounce { from { height: 4px; } to { height: 28px; } }

    #status {
      font-size: 0.82rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      min-height: 1.2em;
      text-align: center;
      transition: color 0.3s ease;
    }
    #status.listening { color: var(--danger);  }
    #status.searching { color: var(--accent2); }
    #status.playing   { color: var(--success); }
    #status.error     { color: var(--danger);  }

    #transcript {
      background: var(--card);
      border: 1px solid rgba(0,229,255,0.1);
      border-radius: 12px;
      padding: 10px 20px;
      font-size: 0.85rem;
      color: var(--text);
      min-height: 38px;
      min-width: 200px;
      max-width: 100%;
      text-align: center;
      opacity: 0;
      transform: translateY(6px);
      transition: all 0.3s ease;
      width: 100%;
    }
    #transcript.visible { opacity: 1; transform: translateY(0); }

    @media (max-width: 480px) {
      #video-wrap { border-radius: 10px; }
    }
  </style>
</head>
<body>

  <!-- ACTIVATE OVERLAY -->
  <div id="activate-screen">
    <div class="activate-logo">NKT JustSay</div>
    <p class="activate-sub">Voice → Song → Instant Play</p>
    <button id="tap-btn" onclick="activateSession()">
      <span>▶ &nbsp;LET ME IN</span>
    </button>
  </div>

  <!-- HEADER -->
  <header>
    <h1>NKT JustSay</h1>
    <p>Say a song · It plays</p>
  </header>

  <!-- MAIN -->
  <div id="main">

    <!-- Video panel (hidden until first song) -->
    <div id="video-wrap">
      <!-- Fullscreen toggle button -->
      <button id="fs-btn" onclick="toggleFullscreen()" title="Fullscreen">
        <svg id="fs-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 3 21 3 21 9"/>
          <polyline points="9 21 3 21 3 15"/>
          <line x1="21" y1="3" x2="14" y2="10"/>
          <line x1="3" y1="21" x2="10" y2="14"/>
        </svg>
      </button>
    </div>

    <div id="now-playing"></div>

    <div class="controls">
      <div id="waveform">
        <div class="bar"></div><div class="bar"></div><div class="bar"></div>
        <div class="bar"></div><div class="bar"></div><div class="bar"></div>
        <div class="bar"></div><div class="bar"></div>
      </div>

      <button id="mic-btn" onclick="toggleListen()" title="Start Listening">
        <div class="ring"></div><div class="ring"></div><div class="ring"></div>
        <svg id="mic-icon" width="32" height="32" viewBox="0 0 24 24" fill="none">
          <rect x="9" y="2" width="6" height="11" rx="3" fill="#00e5ff"/>
          <path d="M5 10a7 7 0 0 0 14 0" stroke="#00e5ff" stroke-width="2" stroke-linecap="round"/>
          <line x1="12" y1="17" x2="12" y2="21" stroke="#00e5ff" stroke-width="2" stroke-linecap="round"/>
          <line x1="9" y1="21" x2="15" y2="21" stroke="#00e5ff" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </button>

      <div id="status">Press mic and say a song name</div>
      <div id="transcript"></div>
    </div>

  </div>

  <script>
    // ─────────────────────────────────────────────────────────────────────────
    //  HOW SEARCH WORKS
    //  1. Fetch YouTube's search results page through a CORS proxy
    //     (allorigins.win or corsproxy.io — tried in order)
    //  2. Pull video IDs + titles out of the raw HTML using regex
    //     (YouTube embeds its data as JSON inside every results page)
    //  3. Play the first result in an Invidious embed (ad-free player)
    // ─────────────────────────────────────────────────────────────────────────

    const CORS_PROXIES = [
      q => `https://api.allorigins.win/get?url=${encodeURIComponent(q)}`,
      q => `https://corsproxy.io/?${encodeURIComponent(q)}`,
      q => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(q)}`,
    ];

    // Invidious instances for the embed player (ad-free)
    const INVIDIOUS_HOSTS = [
      'https://invidious.lunar.icu',
      'https://yewtu.be',
      'https://inv.nadeko.net',
      'https://invidious.privacydev.net',
    ];

    let sessionActive  = false;
    let recognition    = null;
    let isListening    = false;
    let embedHost      = INVIDIOUS_HOSTS[0];
    let isFullscreen   = false;

    // ── SESSION ──────────────────────────────────────────────────────────────
    function activateSession() {
      sessionActive = true;
      const s = document.getElementById('activate-screen');
      s.classList.add('hidden');
      setTimeout(() => s.style.display = 'none', 500);
      pickEmbedHost();
    }

    // Silently find the fastest responding Invidious host for embeds
    async function pickEmbedHost() {
      for (const host of INVIDIOUS_HOSTS) {
        try {
          const r = await fetchWithTimeout(`${host}/api/v1/stats`, 4000);
          if (r.ok) { embedHost = host; return; }
        } catch (_) {}
      }
    }

    // ── SPEECH RECOGNITION ───────────────────────────────────────────────────
    function setupRecognition() {
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SR) {
        setStatus('Speech recognition not supported — use Chrome or Edge', 'error');
        return null;
      }
      const r         = new SR();
      r.lang            = 'en-US';
      r.continuous      = false;
      r.interimResults  = true;
      r.maxAlternatives = 1;

      r.onstart = () => {
        isListening = true;
        setMicState(true);
        setStatus('Listening… speak a song name', 'listening');
        showTranscript('', true);
      };
      r.onresult = (e) => {
        const interim = Array.from(e.results).map(x => x[0].transcript).join('');
        showTranscript(interim, true);
        if (e.results[e.results.length - 1].isFinal) {
          const q = e.results[e.results.length - 1][0].transcript.trim();
          showTranscript(q, true);
          handleQuery(q);
        }
      };
      r.onerror = (e) => {
        isListening = false;
        setMicState(false);
        const msgs = {
          'no-speech':   'No speech detected — try again',
          'not-allowed': 'Microphone blocked — allow access in browser settings',
          'network':     'Network error during recognition',
        };
        setStatus(msgs[e.error] || `Mic error: ${e.error}`, 'error');
      };
      r.onend = () => { isListening = false; setMicState(false); };
      return r;
    }

    function toggleListen() {
      if (!sessionActive) return;
      if (isListening) { recognition && recognition.stop(); return; }
      recognition = setupRecognition();
      if (!recognition) return;
      try { recognition.start(); }
      catch (err) { setStatus('Could not start mic: ' + err.message, 'error'); }
    }

    // ── SEARCH ───────────────────────────────────────────────────────────────
    async function handleQuery(query) {
      if (!query) return;
      setStatus(`Searching for "${query}"…`, 'searching');
      try {
        const result = await searchYouTube(query);
        playVideo(result.videoId, result.title);
      } catch (err) {
        console.error(err);
        setStatus(`Could not find "${query}" — try again`, 'error');
      }
    }

    async function searchYouTube(query) {
      const ytSearchUrl = `https://www.youtube.com/results?search_query=${encodeURIComponent(query + ' song')}`;

      for (let i = 0; i < CORS_PROXIES.length; i++) {
        try {
          const proxyUrl = CORS_PROXIES[i](ytSearchUrl);
          const res = await fetchWithTimeout(proxyUrl, 10000);
          if (!res.ok) { console.warn('Proxy', i, 'returned', res.status); continue; }

          // allorigins wraps in JSON: { contents: "<html>..." }
          // corsproxy and codetabs return raw HTML
          let html;
          const ct = res.headers.get('content-type') || '';
          if (ct.includes('application/json')) {
            const json = await res.json();
            html = json.contents || json.body || '';
          } else {
            html = await res.text();
          }

          const result = parseVideoFromHTML(html);
          if (result) return result;
          console.warn('Proxy', i, 'returned no parseable video');
        } catch (e) {
          console.warn('Proxy', i, 'failed:', e.message);
        }
      }
      throw new Error('All search proxies failed');
    }

    function parseVideoFromHTML(html) {
      if (!html || html.length < 100) return null;

      // YouTube bakes its data into the page as JSON (ytInitialData).
      // The fastest way to extract video IDs is a simple regex — no JSON parsing needed.

      // Strategy 1: find videoId directly adjacent to a title (most reliable structure)
      // Looks for: "videoId":"XXXXXXXXXXX","thumbnail":... or similar tight groupings
      const videoIdMatches = [...html.matchAll(/"videoId":"([a-zA-Z0-9_-]{11})"/g)];
      if (!videoIdMatches.length) return null;

      // Skip videoIds that appear only in "currently playing" or ads sections
      // The first match in search results HTML is almost always the top result
      const videoId = videoIdMatches[0][1];

      // Extract title: look for a "text" field near the videoId position
      let title = '';
      const pos = videoIdMatches[0].index;
      // Search a window of text around the first videoId for a title-like string
      const window = html.substring(Math.max(0, pos - 2000), pos + 500);
      const titleMatch = window.match(/"title":\{"runs":\[\{"text":"([^"]{3,100})"\}/);
      if (titleMatch) {
        title = titleMatch[1];
      } else {
        // Fallback: any quoted text that looks like a song title near the videoId
        const fallback = window.match(/"text":"([^"]{5,80})"/);
        title = fallback ? fallback[1] : videoId;
      }

      // Decode HTML entities in title
      title = title.replace(/\\u0026/g, '&').replace(/\\"/g, '"').replace(/\\\//g, '/');

      return { videoId, title };
    }

    // ── PLAY VIDEO ───────────────────────────────────────────────────────────
    function playVideo(videoId, title) {
      const wrap = document.getElementById('video-wrap');
      const old  = wrap.querySelector('iframe');
      if (old) old.remove();

      // Invidious embed = ad-free, autoplay=1
      const iframe       = document.createElement('iframe');
      iframe.src         = `${embedHost}/embed/${videoId}?autoplay=1&listen=0&quality=hd720`;
      iframe.allow       = 'autoplay; fullscreen; picture-in-picture';
      iframe.allowFullscreen = true;
      iframe.title       = title || 'Video';

      // Insert before the fullscreen button so button stays on top
      wrap.insertBefore(iframe, document.getElementById('fs-btn'));
      wrap.classList.add('active');

      setStatus('Now playing', 'playing');
      showNowPlaying(title || videoId);
      showTranscript('', false);
    }

    // ── FULLSCREEN ────────────────────────────────────────────────────────────
    function toggleFullscreen() {
      const wrap = document.getElementById('video-wrap');

      const inFS = document.fullscreenElement || document.webkitFullscreenElement
                || document.mozFullScreenElement || document.msFullscreenElement;

      if (!inFS) {
        const req = wrap.requestFullscreen || wrap.webkitRequestFullscreen
                  || wrap.mozRequestFullScreen || wrap.msRequestFullscreen;
        if (req) req.call(wrap);
      } else {
        const exit = document.exitFullscreen || document.webkitExitFullscreen
                   || document.mozCancelFullScreen || document.msExitFullscreen;
        if (exit) exit.call(document);
      }
    }

    // Update icon when fullscreen state changes
    function onFullscreenChange() {
      const inFS = !!(document.fullscreenElement || document.webkitFullscreenElement
                   || document.mozFullScreenElement || document.msFullscreenElement);
      const icon = document.getElementById('fs-icon');
      if (inFS) {
        icon.innerHTML = `
          <polyline points="4 14 10 14 10 20"/>
          <polyline points="20 10 14 10 14 4"/>
          <line x1="10" y1="14" x2="3" y2="21"/>
          <line x1="21" y1="3" x2="14" y2="10"/>`;
      } else {
        icon.innerHTML = `
          <polyline points="15 3 21 3 21 9"/>
          <polyline points="9 21 3 21 3 15"/>
          <line x1="21" y1="3" x2="14" y2="10"/>
          <line x1="3" y1="21" x2="10" y2="14"/>`;
      }
    }

    document.addEventListener('fullscreenchange',       onFullscreenChange);
    document.addEventListener('webkitfullscreenchange', onFullscreenChange);
    document.addEventListener('mozfullscreenchange',    onFullscreenChange);

    // Mobile: tap on video to show/hide fullscreen button
    document.getElementById('video-wrap').addEventListener('touchstart', function() {
      this.classList.toggle('touch-show');
      setTimeout(() => this.classList.remove('touch-show'), 3000);
    }, { passive: true });

    // ── HELPERS ──────────────────────────────────────────────────────────────
    function fetchWithTimeout(url, ms) {
      const ctrl = new AbortController();
      const id   = setTimeout(() => ctrl.abort(), ms);
      return fetch(url, { signal: ctrl.signal })
        .then(r   => { clearTimeout(id); return r;   })
        .catch(e  => { clearTimeout(id); throw e;    });
    }

    function setMicState(on) {
      const btn  = document.getElementById('mic-btn');
      const icon = document.getElementById('mic-icon');
      const wave = document.getElementById('waveform');
      if (on) {
        btn.classList.add('listening');
        wave.classList.add('active');
        icon.innerHTML = `
          <rect x="8" y="8" width="8" height="8" rx="2" fill="#ff4f6a"/>
          <circle cx="12" cy="12" r="10" stroke="#ff4f6a" stroke-width="2"/>`;
      } else {
        btn.classList.remove('listening');
        wave.classList.remove('active');
        icon.innerHTML = `
          <rect x="9" y="2" width="6" height="11" rx="3" fill="#00e5ff"/>
          <path d="M5 10a7 7 0 0 0 14 0" stroke="#00e5ff" stroke-width="2" stroke-linecap="round"/>
          <line x1="12" y1="17" x2="12" y2="21" stroke="#00e5ff" stroke-width="2" stroke-linecap="round"/>
          <line x1="9" y1="21" x2="15" y2="21" stroke="#00e5ff" stroke-width="2" stroke-linecap="round"/>`;
      }
    }

    function setStatus(msg, type = '') {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.className   = type;
    }

    function showTranscript(text, show) {
      const el = document.getElementById('transcript');
      if (show) { el.classList.add('visible'); el.textContent = text || '…'; }
      else       { el.classList.remove('visible'); el.textContent = ''; }
    }

    function showNowPlaying(title) {
      const el = document.getElementById('now-playing');
      el.textContent = '▶ ' + title;
      el.classList.add('visible');
    }

    // Spacebar shortcut
    document.addEventListener('keydown', (e) => {
      if (e.code === 'Space' && e.target.tagName !== 'BUTTON') {
        e.preventDefault();
        toggleListen();
      }
    });
  </script>
</body>
</html>
