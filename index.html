<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NKT JustSay</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Sora:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #05080f;
      --card: #111827;
      --accent: #00e5ff;
      --accent2: #7b61ff;
      --text: #e8f0fe;
      --muted: #5a6a82;
      --danger: #ff4f6a;
      --success: #00e5a0;
      --glow: 0 0 30px rgba(0,229,255,0.35);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Sora', sans-serif;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 20% 10%, rgba(0,229,255,0.06) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 80% 80%, rgba(123,97,255,0.07) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    header {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 28px 20px 14px;
      border-bottom: 1px solid rgba(0,229,255,0.08);
    }
    header h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(1.6rem, 5vw, 2.4rem);
      font-weight: 900;
      letter-spacing: 0.12em;
      background: linear-gradient(135deg, #00e5ff 0%, #7b61ff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 20px rgba(0,229,255,0.4));
    }
    header p {
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-top: 4px;
    }

    /* ACTIVATE OVERLAY */
    #activate-screen {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 28px;
      transition: opacity 0.5s ease;
    }
    #activate-screen.hidden { opacity: 0; pointer-events: none; }

    .activate-logo {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(2rem, 8vw, 3.5rem);
      font-weight: 900;
      background: linear-gradient(135deg, #00e5ff 0%, #7b61ff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 25px rgba(0,229,255,0.5));
      animation: pulse-glow 2.5s ease-in-out infinite;
    }
    @keyframes pulse-glow {
      0%, 100% { filter: drop-shadow(0 0 25px rgba(0,229,255,0.5)); }
      50%       { filter: drop-shadow(0 0 40px rgba(0,229,255,0.9)); }
    }
    .activate-sub { color: var(--muted); font-size: 0.9rem; letter-spacing: 0.08em; }

    #tap-btn {
      position: relative;
      background: transparent;
      border: 2px solid var(--accent);
      color: var(--accent);
      font-family: 'Orbitron', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      padding: 18px 48px;
      border-radius: 60px;
      cursor: pointer;
      transition: all 0.25s ease;
      overflow: hidden;
    }
    #tap-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--accent);
      opacity: 0;
      transition: opacity 0.25s ease;
    }
    #tap-btn:hover { box-shadow: 0 0 40px rgba(0,229,255,0.4); color: var(--bg); }
    #tap-btn:hover::before { opacity: 1; }
    #tap-btn span { position: relative; z-index: 1; }

    /* MAIN */
    #main {
      position: relative;
      z-index: 1;
      max-width: 900px;
      margin: 0 auto;
      padding: 24px 16px 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }

    /* VIDEO WRAP */
    #video-wrap {
      width: 100%;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid rgba(0,229,255,0.12);
      background: #000;
      aspect-ratio: 16/9;
      position: relative;
      transition: box-shadow 0.4s ease;
      display: none;
    }
    #video-wrap.active {
      display: block;
      box-shadow: 0 0 60px rgba(0,229,255,0.15), 0 0 120px rgba(123,97,255,0.1);
    }
    #video-wrap iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* FULLSCREEN BUTTON */
    #fs-btn {
      position: absolute;
      bottom: 10px;
      right: 10px;
      z-index: 20;
      width: 38px;
      height: 38px;
      border-radius: 8px;
      background: rgba(5, 8, 15, 0.75);
      border: 1px solid rgba(0,229,255,0.3);
      color: var(--accent);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.25s ease, background 0.2s ease;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }
    #video-wrap:hover #fs-btn,
    #video-wrap.touch-show #fs-btn { opacity: 1; }
    #fs-btn:hover { background: rgba(0,229,255,0.15); }
    #fs-btn svg { pointer-events: none; }

    #video-wrap:fullscreen,
    #video-wrap:-webkit-full-screen {
      width: 100vw !important;
      height: 100vh !important;
      aspect-ratio: unset !important;
      border-radius: 0 !important;
      border: none !important;
      background: #000 !important;
    }
    #video-wrap:fullscreen iframe,
    #video-wrap:-webkit-full-screen iframe {
      width: 100% !important;
      height: 100% !important;
    }
    #video-wrap:fullscreen #fs-btn,
    #video-wrap:-webkit-full-screen #fs-btn { opacity: 1; bottom: 16px; right: 16px; }

    /* NOW PLAYING */
    #now-playing {
      font-size: 0.8rem;
      color: var(--accent);
      letter-spacing: 0.05em;
      min-height: 1.2em;
      text-align: center;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      padding: 0 16px;
      opacity: 0;
      transition: opacity 0.4s ease;
    }
    #now-playing.visible { opacity: 1; }

    /* CONTROLS */
    .controls {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      width: 100%;
    }

    #mic-btn {
      position: relative;
      width: 88px;
      height: 88px;
      border-radius: 50%;
      border: 2px solid rgba(0,229,255,0.3);
      cursor: pointer;
      background: linear-gradient(145deg, #00e5ff22, #7b61ff22);
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #mic-btn:hover { border-color: var(--accent); box-shadow: var(--glow); }
    #mic-btn.listening {
      border-color: var(--danger);
      background: linear-gradient(145deg, #ff4f6a22, #ff4f6a11);
      animation: mic-pulse 1s ease-in-out infinite;
    }
    @keyframes mic-pulse {
      0%, 100% { box-shadow: 0 0 0 0    rgba(255,79,106,0.5); }
      50%       { box-shadow: 0 0 0 20px rgba(255,79,106,0);   }
    }
    #mic-btn .ring {
      position: absolute;
      inset: -8px;
      border-radius: 50%;
      border: 2px solid var(--danger);
      opacity: 0;
    }
    #mic-btn.listening .ring:nth-child(1) { animation: ring-out 1.4s ease-out 0s   infinite; }
    #mic-btn.listening .ring:nth-child(2) { animation: ring-out 1.4s ease-out 0.4s infinite; }
    #mic-btn.listening .ring:nth-child(3) { animation: ring-out 1.4s ease-out 0.8s infinite; }
    @keyframes ring-out {
      0%   { inset: -4px;  opacity: 0.6; }
      100% { inset: -28px; opacity: 0;   }
    }

    #waveform {
      display: flex;
      align-items: center;
      gap: 4px;
      height: 32px;
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    #waveform.active { opacity: 1; }
    #waveform .bar { width: 4px; border-radius: 2px; background: var(--danger); }
    #waveform.active .bar { animation: wave-bounce 0.8s ease-in-out infinite alternate; }
    #waveform .bar:nth-child(1) { animation-delay: 0s;    }
    #waveform .bar:nth-child(2) { animation-delay: 0.1s;  }
    #waveform .bar:nth-child(3) { animation-delay: 0.2s;  }
    #waveform .bar:nth-child(4) { animation-delay: 0.05s; }
    #waveform .bar:nth-child(5) { animation-delay: 0.15s; }
    #waveform .bar:nth-child(6) { animation-delay: 0.25s; }
    #waveform .bar:nth-child(7) { animation-delay: 0s;    }
    #waveform .bar:nth-child(8) { animation-delay: 0.12s; }
    @keyframes wave-bounce { from { height: 4px; } to { height: 28px; } }

    #status {
      font-size: 0.82rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      min-height: 1.2em;
      text-align: center;
      transition: color 0.3s ease;
    }
    #status.listening { color: var(--danger);  }
    #status.searching { color: var(--accent2); }
    #status.playing   { color: var(--success); }
    #status.error     { color: var(--danger);  }

    #transcript {
      background: var(--card);
      border: 1px solid rgba(0,229,255,0.1);
      border-radius: 12px;
      padding: 10px 20px;
      font-size: 0.85rem;
      color: var(--text);
      min-height: 38px;
      min-width: 200px;
      max-width: 100%;
      text-align: center;
      opacity: 0;
      transform: translateY(6px);
      transition: all 0.3s ease;
      width: 100%;
    }
    #transcript.visible { opacity: 1; transform: translateY(0); }

    @media (max-width: 480px) {
      #video-wrap { border-radius: 10px; }
    }
  </style>
</head>
<body>

  <!-- ACTIVATE OVERLAY -->
  <div id="activate-screen">
    <div class="activate-logo">NKT JustSay</div>
    <p class="activate-sub">Voice → Song → Instant Play</p>
    <button id="tap-btn" onclick="activateSession()">
      <span>▶ &nbsp;LET ME IN</span>
    </button>
  </div>

  <!-- HEADER -->
  <header>
    <h1>NKT JustSay</h1>
    <p>Say a song · It plays</p>
  </header>

  <!-- MAIN -->
  <div id="main">

    <div id="video-wrap">
      <button id="fs-btn" onclick="toggleFullscreen()" title="Fullscreen">
        <svg id="fs-icon" width="18" height="18" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 3 21 3 21 9"/>
          <polyline points="9 21 3 21 3 15"/>
          <line x1="21" y1="3" x2="14" y2="10"/>
          <line x1="3" y1="21" x2="10" y2="14"/>
        </svg>
      </button>
    </div>

    <div id="now-playing"></div>

    <div class="controls">
      <div id="waveform">
        <div class="bar"></div><div class="bar"></div><div class="bar"></div>
        <div class="bar"></div><div class="bar"></div><div class="bar"></div>
        <div class="bar"></div><div class="bar"></div>
      </div>

      <button id="mic-btn" onclick="toggleListen()" title="Start Listening">
        <div class="ring"></div><div class="ring"></div><div class="ring"></div>
        <svg id="mic-icon" width="32" height="32" viewBox="0 0 24 24" fill="none">
          <rect x="9" y="2" width="6" height="11" rx="3" fill="#00e5ff"/>
          <path d="M5 10a7 7 0 0 0 14 0" stroke="#00e5ff" stroke-width="2" stroke-linecap="round"/>
          <line x1="12" y1="17" x2="12" y2="21" stroke="#00e5ff" stroke-width="2" stroke-linecap="round"/>
          <line x1="9" y1="21" x2="15" y2="21" stroke="#00e5ff" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </button>

      <div id="status">Press mic and say a song name</div>
      <div id="transcript"></div>
    </div>

  </div>

  <script>
    // ─────────────────────────────────────────────────────────────────────────
    //  SEARCH  : CORS proxy → fetch YouTube search HTML → regex out videoId+title
    //  PLAYBACK: youtube-nocookie.com/embed  (no ads, no tracking, always works)
    // ─────────────────────────────────────────────────────────────────────────

    // Three independent CORS proxies, tried in order
    const PROXIES = [
      q => `https://api.allorigins.win/get?url=${encodeURIComponent(q)}`,
      q => `https://corsproxy.io/?${encodeURIComponent(q)}`,
      q => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(q)}`,
    ];

    let sessionActive = false;
    let recognition   = null;
    let isListening   = false;

    // ── SESSION ──────────────────────────────────────────────────────────────
    function activateSession() {
      sessionActive = true;
      const s = document.getElementById('activate-screen');
      s.classList.add('hidden');
      setTimeout(() => s.style.display = 'none', 500);
    }

    // ── SPEECH RECOGNITION ───────────────────────────────────────────────────
    function setupRecognition() {
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SR) {
        setStatus('Speech recognition not supported — use Chrome or Edge', 'error');
        return null;
      }
      const r         = new SR();
      r.lang            = 'en-US';
      r.continuous      = false;
      r.interimResults  = true;
      r.maxAlternatives = 1;

      r.onstart = () => {
        isListening = true;
        setMicState(true);
        setStatus('Listening… speak a song name', 'listening');
        showTranscript('', true);
      };
      r.onresult = (e) => {
        const interim = Array.from(e.results).map(x => x[0].transcript).join('');
        showTranscript(interim, true);
        if (e.results[e.results.length - 1].isFinal) {
          const q = e.results[e.results.length - 1][0].transcript.trim();
          showTranscript(q, true);
          handleQuery(q);
        }
      };
      r.onerror = (e) => {
        isListening = false;
        setMicState(false);
        const msgs = {
          'no-speech':   'No speech detected — try again',
          'not-allowed': 'Microphone blocked — allow access in browser settings',
          'network':     'Network error during recognition',
        };
        setStatus(msgs[e.error] || `Mic error: ${e.error}`, 'error');
      };
      r.onend = () => { isListening = false; setMicState(false); };
      return r;
    }

    function toggleListen() {
      if (!sessionActive) return;
      if (isListening) { recognition && recognition.stop(); return; }
      recognition = setupRecognition();
      if (!recognition) return;
      try { recognition.start(); }
      catch (err) { setStatus('Could not start mic: ' + err.message, 'error'); }
    }

    // ── SEARCH ───────────────────────────────────────────────────────────────
    async function handleQuery(query) {
      if (!query) return;
      setStatus(`Searching for "${query}"…`, 'searching');
      try {
        const result = await searchYouTube(query);
        playVideo(result.videoId, result.title);
      } catch (err) {
        console.error(err);
        setStatus(`Could not find "${query}" — try again`, 'error');
      }
    }

    async function searchYouTube(query) {
      // Search YouTube directly; the HTML page contains JSON with all result data
      const ytUrl = `https://www.youtube.com/results?search_query=${encodeURIComponent(query + ' official audio')}`;

      for (let i = 0; i < PROXIES.length; i++) {
        try {
          const res = await fetchWithTimeout(PROXIES[i](ytUrl), 12000);
          if (!res.ok) { console.warn('Proxy', i, 'HTTP', res.status); continue; }

          // allorigins returns JSON wrapper; others return raw HTML
          let html;
          const ct = res.headers.get('content-type') || '';
          if (ct.includes('application/json')) {
            const j = await res.json();
            html = j.contents || j.body || '';
          } else {
            html = await res.text();
          }

          const result = extractFirstVideo(html);
          if (result) {
            console.log('Found via proxy', i, ':', result.title, result.videoId);
            return result;
          }
          console.warn('Proxy', i, ': HTML received but no video found');
        } catch (e) {
          console.warn('Proxy', i, 'error:', e.message);
        }
      }
      throw new Error('All proxies exhausted');
    }

    function extractFirstVideo(html) {
      if (!html || html.length < 500) return null;

      // YouTube embeds a JS variable: var ytInitialData = {...};
      // We pull videoId + title pairs out of it with a targeted regex.
      // Pattern matches: "videoId":"XXXXXXXXXXX"  anywhere in the page data.

      // Collect all videoId occurrences
      const idMatches = [...html.matchAll(/"videoId":"([a-zA-Z0-9_-]{11})"/g)];
      if (!idMatches.length) return null;

      // The first videoId in ytInitialData is the top search result.
      // Skip any that appear before ytInitialData (e.g. in inline scripts/ads).
      const dataStart = html.indexOf('ytInitialData');
      const candidates = dataStart > -1
        ? idMatches.filter(m => m.index > dataStart)
        : idMatches;

      const match = candidates[0] || idMatches[0];
      const videoId = match[1];

      // Extract title: scan a window of text around the videoId match for a title field.
      // YouTube structure near a result: ..."videoId":"ID"...,"title":{"runs":[{"text":"TITLE"}
      // We search backwards from the match index to find the nearest title.
      const searchStart = Math.max(0, match.index - 3000);
      const searchEnd   = Math.min(html.length, match.index + 1000);
      const chunk       = html.substring(searchStart, searchEnd);

      let title = '';

      // Try structured title pattern first
      const t1 = chunk.match(/"title":\{"runs":\[\{"text":"((?:[^"\\]|\\.)*)"\}/);
      if (t1) title = t1[1];

      // Fallback: simpleText pattern
      if (!title) {
        const t2 = chunk.match(/"title":\{"simpleText":"((?:[^"\\]|\\.)*)"\}/);
        if (t2) title = t2[1];
      }

      // Last resort: any reasonable quoted string near the ID
      if (!title) {
        const t3 = chunk.match(/"text":"([^"]{8,100})"/);
        if (t3) title = t3[1];
      }

      if (!title) title = 'Now Playing';

      // Unescape common sequences
      title = title
        .replace(/\\u0026/g, '&')
        .replace(/\\u003c/g, '<')
        .replace(/\\u003e/g, '>')
        .replace(/\\"/g, '"')
        .replace(/\\\//g, '/');

      return { videoId, title };
    }

    // ── PLAY VIDEO ───────────────────────────────────────────────────────────
    // youtube-nocookie.com = YouTube's own privacy-enhanced embed
    // — no cookies, no personalised ads, completely reliable
    function playVideo(videoId, title) {
      const wrap = document.getElementById('video-wrap');
      const old  = wrap.querySelector('iframe');
      if (old) old.remove();

      const iframe           = document.createElement('iframe');
      iframe.src             = `https://www.youtube-nocookie.com/embed/${videoId}?autoplay=1&rel=0&modestbranding=1`;
      iframe.allow           = 'autoplay; fullscreen; picture-in-picture';
      iframe.allowFullscreen = true;
      iframe.title           = title;

      // Insert before the FS button so the button stays on top
      wrap.insertBefore(iframe, document.getElementById('fs-btn'));
      wrap.classList.add('active');

      setStatus('Now playing', 'playing');
      showNowPlaying(title);
      showTranscript('', false);
    }

    // ── FULLSCREEN ────────────────────────────────────────────────────────────
    function toggleFullscreen() {
      const wrap = document.getElementById('video-wrap');
      const inFS = document.fullscreenElement || document.webkitFullscreenElement
                || document.mozFullScreenElement || document.msFullscreenElement;
      if (!inFS) {
        (wrap.requestFullscreen || wrap.webkitRequestFullscreen
         || wrap.mozRequestFullScreen || wrap.msRequestFullscreen).call(wrap);
      } else {
        (document.exitFullscreen || document.webkitExitFullscreen
         || document.mozCancelFullScreen || document.msExitFullscreen).call(document);
      }
    }

    function onFSChange() {
      const inFS = !!(document.fullscreenElement || document.webkitFullscreenElement
                   || document.mozFullScreenElement || document.msFullscreenElement);
      document.getElementById('fs-icon').innerHTML = inFS ? `
        <polyline points="4 14 10 14 10 20"/>
        <polyline points="20 10 14 10 14 4"/>
        <line x1="10" y1="14" x2="3" y2="21"/>
        <line x1="21" y1="3" x2="14" y2="10"/>` : `
        <polyline points="15 3 21 3 21 9"/>
        <polyline points="9 21 3 21 3 15"/>
        <line x1="21" y1="3" x2="14" y2="10"/>
        <line x1="3" y1="21" x2="10" y2="14"/>`;
    }

    ['fullscreenchange','webkitfullscreenchange','mozfullscreenchange']
      .forEach(e => document.addEventListener(e, onFSChange));

    // Mobile: tap video area to reveal the fullscreen button briefly
    document.getElementById('video-wrap').addEventListener('touchstart', function() {
      this.classList.add('touch-show');
      clearTimeout(this._touchTimer);
      this._touchTimer = setTimeout(() => this.classList.remove('touch-show'), 3000);
    }, { passive: true });

    // ── HELPERS ──────────────────────────────────────────────────────────────
    function fetchWithTimeout(url, ms) {
      const ctrl = new AbortController();
      const id   = setTimeout(() => ctrl.abort(), ms);
      return fetch(url, { signal: ctrl.signal })
        .then(r  => { clearTimeout(id); return r;  })
        .catch(e => { clearTimeout(id); throw e;   });
    }

    function setMicState(on) {
      const btn  = document.getElementById('mic-btn');
      const icon = document.getElementById('mic-icon');
      const wave = document.getElementById('waveform');
      if (on) {
        btn.classList.add('listening');
        wave.classList.add('active');
        icon.innerHTML = `
          <rect x="8" y="8" width="8" height="8" rx="2" fill="#ff4f6a"/>
          <circle cx="12" cy="12" r="10" stroke="#ff4f6a" stroke-width="2"/>`;
      } else {
        btn.classList.remove('listening');
        wave.classList.remove('active');
        icon.innerHTML = `
          <rect x="9" y="2" width="6" height="11" rx="3" fill="#00e5ff"/>
          <path d="M5 10a7 7 0 0 0 14 0" stroke="#00e5ff" stroke-width="2" stroke-linecap="round"/>
          <line x1="12" y1="17" x2="12" y2="21" stroke="#00e5ff" stroke-width="2" stroke-linecap="round"/>
          <line x1="9" y1="21" x2="15" y2="21" stroke="#00e5ff" stroke-width="2" stroke-linecap="round"/>`;
      }
    }

    function setStatus(msg, type = '') {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.className   = type;
    }

    function showTranscript(text, show) {
      const el = document.getElementById('transcript');
      if (show) { el.classList.add('visible'); el.textContent = text || '…'; }
      else       { el.classList.remove('visible'); el.textContent = ''; }
    }

    function showNowPlaying(title) {
      const el = document.getElementById('now-playing');
      el.textContent = '▶ ' + title;
      el.classList.add('visible');
    }

    document.addEventListener('keydown', (e) => {
      if (e.code === 'Space' && e.target.tagName !== 'BUTTON') {
        e.preventDefault();
        toggleListen();
      }
    });
  </script>
</body>
</html>
