<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NKT JustSay</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Sora:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #05080f;
      --surface: #0c1220;
      --card: #111827;
      --accent: #00e5ff;
      --accent2: #7b61ff;
      --text: #e8f0fe;
      --muted: #5a6a82;
      --danger: #ff4f6a;
      --success: #00e5a0;
      --glow: 0 0 30px rgba(0, 229, 255, 0.35);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Sora', sans-serif;
      overflow-x: hidden;
    }

    /* ───── BACKGROUND MESH ───── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 20% 10%, rgba(0,229,255,0.06) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 80% 80%, rgba(123,97,255,0.07) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    /* ───── HEADER ───── */
    header {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 28px 20px 14px;
      border-bottom: 1px solid rgba(0,229,255,0.08);
    }

    header h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(1.6rem, 5vw, 2.4rem);
      font-weight: 900;
      letter-spacing: 0.12em;
      background: linear-gradient(135deg, #00e5ff 0%, #7b61ff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: none;
      filter: drop-shadow(0 0 20px rgba(0,229,255,0.4));
    }

    header p {
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-top: 4px;
    }

    /* ───── ACTIVATE OVERLAY ───── */
    #activate-screen {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 28px;
      transition: opacity 0.5s ease;
    }

    #activate-screen.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .activate-logo {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(2rem, 8vw, 3.5rem);
      font-weight: 900;
      background: linear-gradient(135deg, #00e5ff 0%, #7b61ff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 25px rgba(0,229,255,0.5));
      animation: pulse-glow 2.5s ease-in-out infinite;
    }

    @keyframes pulse-glow {
      0%, 100% { filter: drop-shadow(0 0 25px rgba(0,229,255,0.5)); }
      50% { filter: drop-shadow(0 0 40px rgba(0,229,255,0.9)); }
    }

    .activate-sub {
      color: var(--muted);
      font-size: 0.9rem;
      letter-spacing: 0.08em;
    }

    #tap-btn {
      position: relative;
      background: transparent;
      border: 2px solid var(--accent);
      color: var(--accent);
      font-family: 'Orbitron', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      padding: 18px 48px;
      border-radius: 60px;
      cursor: pointer;
      transition: all 0.25s ease;
      overflow: hidden;
    }

    #tap-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--accent);
      opacity: 0;
      transition: opacity 0.25s ease;
    }

    #tap-btn:hover {
      box-shadow: 0 0 40px rgba(0,229,255,0.4);
      color: var(--bg);
    }
    #tap-btn:hover::before { opacity: 1; }
    #tap-btn span { position: relative; z-index: 1; }

    /* ───── MAIN CONTENT ───── */
    #main {
      position: relative;
      z-index: 1;
      max-width: 900px;
      margin: 0 auto;
      padding: 24px 16px 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }

    /* ───── VIDEO AREA ───── */
    #video-wrap {
      width: 100%;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid rgba(0,229,255,0.12);
      background: var(--card);
      aspect-ratio: 16/9;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      transition: box-shadow 0.4s ease;
    }

    #video-wrap.active {
      box-shadow: 0 0 60px rgba(0,229,255,0.15), 0 0 120px rgba(123,97,255,0.1);
    }

    #video-wrap iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    .video-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      color: var(--muted);
      padding: 20px;
      text-align: center;
    }

    .video-placeholder svg {
      opacity: 0.3;
    }

    .video-placeholder p {
      font-size: 0.85rem;
      letter-spacing: 0.05em;
    }

    /* ───── NOW PLAYING ───── */
    #now-playing {
      font-size: 0.8rem;
      color: var(--accent);
      letter-spacing: 0.08em;
      min-height: 1.2em;
      text-align: center;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      padding: 0 16px;
      opacity: 0;
      transition: opacity 0.4s ease;
    }
    #now-playing.visible { opacity: 1; }

    /* ───── CONTROLS ───── */
    .controls {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      width: 100%;
    }

    /* MIC BUTTON */
    #mic-btn {
      position: relative;
      width: 88px;
      height: 88px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      background: linear-gradient(145deg, #00e5ff22, #7b61ff22);
      border: 2px solid rgba(0,229,255,0.3);
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #mic-btn:hover {
      border-color: var(--accent);
      box-shadow: var(--glow);
    }

    #mic-btn.listening {
      border-color: var(--danger);
      background: linear-gradient(145deg, #ff4f6a22, #ff4f6a11);
      animation: mic-pulse 1s ease-in-out infinite;
    }

    @keyframes mic-pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(255,79,106,0.5); }
      50% { box-shadow: 0 0 0 20px rgba(255,79,106,0); }
    }

    #mic-btn svg { transition: all 0.3s ease; }

    /* WAVEFORM RINGS */
    #mic-btn .ring {
      position: absolute;
      inset: -8px;
      border-radius: 50%;
      border: 2px solid var(--danger);
      opacity: 0;
      animation: none;
    }

    #mic-btn.listening .ring:nth-child(1) {
      animation: ring-out 1.4s ease-out infinite;
    }
    #mic-btn.listening .ring:nth-child(2) {
      animation: ring-out 1.4s ease-out 0.4s infinite;
    }
    #mic-btn.listening .ring:nth-child(3) {
      animation: ring-out 1.4s ease-out 0.8s infinite;
    }

    @keyframes ring-out {
      0% { inset: -4px; opacity: 0.6; }
      100% { inset: -28px; opacity: 0; }
    }

    /* STATUS */
    #status {
      font-size: 0.82rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      min-height: 1.2em;
      text-align: center;
      transition: color 0.3s ease;
    }

    #status.listening { color: var(--danger); }
    #status.searching { color: var(--accent2); }
    #status.playing { color: var(--success); }
    #status.error { color: var(--danger); }

    /* WAVEFORM BARS (visual effect when listening) */
    #waveform {
      display: flex;
      align-items: center;
      gap: 4px;
      height: 32px;
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    #waveform.active { opacity: 1; }

    #waveform .bar {
      width: 4px;
      border-radius: 2px;
      background: var(--danger);
      animation: none;
    }

    #waveform.active .bar {
      animation: wave-bounce 0.8s ease-in-out infinite alternate;
    }

    #waveform .bar:nth-child(1) { animation-delay: 0s; }
    #waveform .bar:nth-child(2) { animation-delay: 0.1s; }
    #waveform .bar:nth-child(3) { animation-delay: 0.2s; }
    #waveform .bar:nth-child(4) { animation-delay: 0.05s; }
    #waveform .bar:nth-child(5) { animation-delay: 0.15s; }
    #waveform .bar:nth-child(6) { animation-delay: 0.25s; }
    #waveform .bar:nth-child(7) { animation-delay: 0.0s; }
    #waveform .bar:nth-child(8) { animation-delay: 0.12s; }

    @keyframes wave-bounce {
      from { height: 4px; }
      to { height: 28px; }
    }

    /* TRANSCRIPT BUBBLE */
    #transcript {
      background: var(--card);
      border: 1px solid rgba(0,229,255,0.1);
      border-radius: 12px;
      padding: 10px 20px;
      font-size: 0.85rem;
      color: var(--text);
      min-height: 38px;
      min-width: 200px;
      max-width: 100%;
      text-align: center;
      opacity: 0;
      transform: translateY(6px);
      transition: all 0.3s ease;
      width: 100%;
    }
    #transcript.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* NOTICE */
    .notice {
      font-size: 0.72rem;
      color: var(--muted);
      text-align: center;
      opacity: 0.6;
      line-height: 1.5;
    }

    /* ───── RESPONSIVE ───── */
    @media (max-width: 480px) {
      #video-wrap { border-radius: 10px; }
    }
  </style>
</head>
<body>

  <!-- ── ACTIVATE OVERLAY ── -->
  <div id="activate-screen">
    <div class="activate-logo">NKT JustSay</div>
    <p class="activate-sub">Voice → Song → Instant Play</p>
    <button id="tap-btn" onclick="activateSession()">
      <span>▶ &nbsp;TAP TO START SESSION</span>
    </button>
    <p class="notice">Required once to enable unmuted autoplay</p>
  </div>

  <!-- ── HEADER ── -->
  <header>
    <h1>NKT JustSay</h1>
    <p>Say a song · It plays</p>
  </header>

  <!-- ── MAIN ── -->
  <div id="main">

    <!-- VIDEO PLAYER -->
    <div id="video-wrap">
      <div class="video-placeholder" id="placeholder">
        <svg width="64" height="64" viewBox="0 0 64 64" fill="none">
          <circle cx="32" cy="32" r="30" stroke="#00e5ff" stroke-width="1.5"/>
          <path d="M26 22 L46 32 L26 42 Z" fill="#00e5ff"/>
        </svg>
        <p>Say a song name to begin</p>
      </div>
    </div>

    <!-- NOW PLAYING -->
    <div id="now-playing"></div>

    <!-- CONTROLS -->
    <div class="controls">
      <div id="waveform">
        <div class="bar"></div><div class="bar"></div><div class="bar"></div>
        <div class="bar"></div><div class="bar"></div><div class="bar"></div>
        <div class="bar"></div><div class="bar"></div>
      </div>

      <button id="mic-btn" onclick="toggleListen()" title="Start Listening">
        <div class="ring"></div>
        <div class="ring"></div>
        <div class="ring"></div>
        <svg id="mic-icon" width="32" height="32" viewBox="0 0 24 24" fill="none">
          <rect x="9" y="2" width="6" height="11" rx="3" fill="#00e5ff"/>
          <path d="M5 10a7 7 0 0 0 14 0" stroke="#00e5ff" stroke-width="2" stroke-linecap="round"/>
          <line x1="12" y1="17" x2="12" y2="21" stroke="#00e5ff" stroke-width="2" stroke-linecap="round"/>
          <line x1="9" y1="21" x2="15" y2="21" stroke="#00e5ff" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </button>

      <div id="status">Press mic and say a song name</div>
      <div id="transcript"></div>
    </div>

    <p class="notice">Ad-free · Powered by open video infrastructure · Requires HTTPS</p>
  </div>

  <script>
    // ─── CONFIG ───────────────────────────────────────────────
    // Invidious instances (tried in order until one works)
    const INVIDIOUS = [
      'https://inv.tux.pizza',
      'https://yewtu.be',
      'https://invidious.privacydev.net',
      'https://invidious.nerdvpn.de',
      'https://vid.puffyan.us',
    ];

    let sessionActive = false;
    let recognition = null;
    let isListening = false;

    // ─── SESSION ACTIVATE ─────────────────────────────────────
    function activateSession() {
      sessionActive = true;
      document.getElementById('activate-screen').classList.add('hidden');
      setTimeout(() => {
        document.getElementById('activate-screen').style.display = 'none';
      }, 500);
    }

    // ─── SPEECH RECOGNITION ───────────────────────────────────
    function setupRecognition() {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SpeechRecognition) {
        setStatus('Speech recognition not supported in this browser', 'error');
        return null;
      }
      const r = new SpeechRecognition();
      r.lang = 'en-US';
      r.continuous = false;
      r.interimResults = true;
      r.maxAlternatives = 1;

      r.onstart = () => {
        isListening = true;
        setMicState(true);
        setStatus('Listening… speak a song name', 'listening');
        showTranscript('', true);
      };

      r.onresult = (e) => {
        const interim = Array.from(e.results)
          .map(r => r[0].transcript).join('');
        showTranscript(interim, true);

        if (e.results[e.results.length - 1].isFinal) {
          const query = e.results[e.results.length - 1][0].transcript.trim();
          showTranscript(query, true);
          handleQuery(query);
        }
      };

      r.onerror = (e) => {
        isListening = false;
        setMicState(false);
        if (e.error === 'no-speech') {
          setStatus('No speech detected. Try again.', 'error');
        } else if (e.error === 'not-allowed') {
          setStatus('Microphone access denied. Check browser permissions.', 'error');
        } else {
          setStatus(`Error: ${e.error}`, 'error');
        }
      };

      r.onend = () => {
        isListening = false;
        setMicState(false);
      };

      return r;
    }

    function toggleListen() {
      if (!sessionActive) {
        setStatus('Please tap "TAP TO START SESSION" first', 'error');
        return;
      }

      if (isListening) {
        if (recognition) recognition.stop();
        return;
      }

      recognition = setupRecognition();
      if (!recognition) return;

      try {
        recognition.start();
      } catch (err) {
        setStatus('Could not start microphone: ' + err.message, 'error');
      }
    }

    // ─── SEARCH & PLAY ────────────────────────────────────────
    async function handleQuery(query) {
      if (!query) return;
      setStatus(`Searching: "${query}"`, 'searching');

      try {
        const { videoId, title, instance } = await searchVideo(query);
        playVideo(videoId, title, instance);
      } catch (err) {
        setStatus('Search failed. Check connection or try again.', 'error');
        console.error(err);
      }
    }

    async function searchVideo(query) {
      for (const instance of INVIDIOUS) {
        try {
          const url = `${instance}/api/v1/search?q=${encodeURIComponent(query)}&type=video&fields=videoId,title&page=1`;
          const resp = await fetch(url, { signal: AbortSignal.timeout(6000) });
          if (!resp.ok) continue;
          const data = await resp.json();
          if (Array.isArray(data) && data.length > 0) {
            return {
              videoId: data[0].videoId,
              title: data[0].title,
              instance
            };
          }
        } catch (e) {
          console.warn(`Instance ${instance} failed:`, e.message);
        }
      }
      throw new Error('All Invidious instances failed');
    }

    function playVideo(videoId, title, instance) {
      const wrap = document.getElementById('video-wrap');
      const placeholder = document.getElementById('placeholder');

      // Remove old iframe
      const old = wrap.querySelector('iframe');
      if (old) old.remove();

      // Build embed URL — Invidious embed is ad-free
      const embedUrl = `${instance}/embed/${videoId}?autoplay=1&listen=0&quality=hd720`;

      const iframe = document.createElement('iframe');
      iframe.src = embedUrl;
      iframe.allow = 'autoplay; fullscreen; picture-in-picture';
      iframe.allowFullscreen = true;
      iframe.title = title || 'Video';

      if (placeholder) placeholder.style.display = 'none';
      wrap.appendChild(iframe);
      wrap.classList.add('active');

      setStatus('Now playing', 'playing');
      showNowPlaying(title || videoId);
      showTranscript('', false);
    }

    // ─── UI HELPERS ───────────────────────────────────────────
    function setMicState(active) {
      const btn = document.getElementById('mic-btn');
      const icon = document.getElementById('mic-icon');
      const wave = document.getElementById('waveform');

      if (active) {
        btn.classList.add('listening');
        wave.classList.add('active');
        // Switch to stop icon
        icon.innerHTML = `
          <rect x="8" y="8" width="8" height="8" rx="2" fill="#ff4f6a"/>
          <circle cx="12" cy="12" r="10" stroke="#ff4f6a" stroke-width="2"/>
        `;
      } else {
        btn.classList.remove('listening');
        wave.classList.remove('active');
        icon.innerHTML = `
          <rect x="9" y="2" width="6" height="11" rx="3" fill="#00e5ff"/>
          <path d="M5 10a7 7 0 0 0 14 0" stroke="#00e5ff" stroke-width="2" stroke-linecap="round"/>
          <line x1="12" y1="17" x2="12" y2="21" stroke="#00e5ff" stroke-width="2" stroke-linecap="round"/>
          <line x1="9" y1="21" x2="15" y2="21" stroke="#00e5ff" stroke-width="2" stroke-linecap="round"/>
        `;
      }
    }

    function setStatus(msg, type = '') {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.className = type;
    }

    function showTranscript(text, show) {
      const el = document.getElementById('transcript');
      if (show) {
        el.classList.add('visible');
        el.textContent = text || '…';
      } else {
        el.classList.remove('visible');
        el.textContent = '';
      }
    }

    function showNowPlaying(title) {
      const el = document.getElementById('now-playing');
      el.textContent = '▶ ' + title;
      el.classList.add('visible');
    }

    // ─── KEYBOARD SHORTCUT ────────────────────────────────────
    document.addEventListener('keydown', (e) => {
      if (e.code === 'Space' && e.target.tagName !== 'BUTTON') {
        e.preventDefault();
        toggleListen();
      }
    });
  </script>
</body>
</html>
