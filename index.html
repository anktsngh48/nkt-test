<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NKT JustSay</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Sora:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #05080f;
      --card: #111827;
      --accent: #00e5ff;
      --accent2: #7b61ff;
      --text: #e8f0fe;
      --muted: #5a6a82;
      --danger: #ff4f6a;
      --success: #00e5a0;
      --glow: 0 0 30px rgba(0,229,255,0.35);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Sora', sans-serif;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 20% 10%, rgba(0,229,255,0.06) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 80% 80%, rgba(123,97,255,0.07) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── HEADER ── */
    header {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 28px 20px 14px;
      border-bottom: 1px solid rgba(0,229,255,0.08);
    }
    header h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(1.6rem, 5vw, 2.4rem);
      font-weight: 900;
      letter-spacing: 0.12em;
      background: linear-gradient(135deg, #00e5ff 0%, #7b61ff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 20px rgba(0,229,255,0.4));
    }
    header p {
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-top: 4px;
    }

    /* ── ACTIVATE OVERLAY ── */
    #activate-screen {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 28px;
      transition: opacity 0.5s ease;
    }
    #activate-screen.hidden { opacity: 0; pointer-events: none; }

    .activate-logo {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(2rem, 8vw, 3.5rem);
      font-weight: 900;
      background: linear-gradient(135deg, #00e5ff 0%, #7b61ff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 25px rgba(0,229,255,0.5));
      animation: pulse-glow 2.5s ease-in-out infinite;
    }
    @keyframes pulse-glow {
      0%, 100% { filter: drop-shadow(0 0 25px rgba(0,229,255,0.5)); }
      50%       { filter: drop-shadow(0 0 40px rgba(0,229,255,0.9)); }
    }
    .activate-sub { color: var(--muted); font-size: 0.9rem; letter-spacing: 0.08em; }

    #tap-btn {
      position: relative;
      background: transparent;
      border: 2px solid var(--accent);
      color: var(--accent);
      font-family: 'Orbitron', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      padding: 18px 48px;
      border-radius: 60px;
      cursor: pointer;
      transition: all 0.25s ease;
      overflow: hidden;
    }
    #tap-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--accent);
      opacity: 0;
      transition: opacity 0.25s ease;
    }
    #tap-btn:hover { box-shadow: 0 0 40px rgba(0,229,255,0.4); color: var(--bg); }
    #tap-btn:hover::before { opacity: 1; }
    #tap-btn span { position: relative; z-index: 1; }

    /* ── MAIN ── */
    #main {
      position: relative;
      z-index: 1;
      max-width: 900px;
      margin: 0 auto;
      padding: 24px 16px 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }

    /* ── VIDEO WRAP ── */
    #video-wrap {
      width: 100%;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid rgba(0,229,255,0.12);
      background: var(--card);
      aspect-ratio: 16/9;
      position: relative;
      transition: box-shadow 0.4s ease;
      display: none;
    }
    #video-wrap.active {
      display: block;
      box-shadow: 0 0 60px rgba(0,229,255,0.15), 0 0 120px rgba(123,97,255,0.1);
    }
    #video-wrap iframe { width: 100%; height: 100%; border: none; display: block; }

    /* ── NOW PLAYING ── */
    #now-playing {
      font-size: 0.8rem;
      color: var(--accent);
      letter-spacing: 0.08em;
      min-height: 1.2em;
      text-align: center;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      padding: 0 16px;
      opacity: 0;
      transition: opacity 0.4s ease;
    }
    #now-playing.visible { opacity: 1; }

    /* ── CONTROLS ── */
    .controls {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      width: 100%;
    }

    #mic-btn {
      position: relative;
      width: 88px;
      height: 88px;
      border-radius: 50%;
      border: 2px solid rgba(0,229,255,0.3);
      cursor: pointer;
      background: linear-gradient(145deg, #00e5ff22, #7b61ff22);
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #mic-btn:hover { border-color: var(--accent); box-shadow: var(--glow); }
    #mic-btn.listening {
      border-color: var(--danger);
      background: linear-gradient(145deg, #ff4f6a22, #ff4f6a11);
      animation: mic-pulse 1s ease-in-out infinite;
    }
    @keyframes mic-pulse {
      0%, 100% { box-shadow: 0 0 0 0    rgba(255,79,106,0.5); }
      50%       { box-shadow: 0 0 0 20px rgba(255,79,106,0);   }
    }
    #mic-btn .ring {
      position: absolute;
      inset: -8px;
      border-radius: 50%;
      border: 2px solid var(--danger);
      opacity: 0;
    }
    #mic-btn.listening .ring:nth-child(1) { animation: ring-out 1.4s ease-out 0s   infinite; }
    #mic-btn.listening .ring:nth-child(2) { animation: ring-out 1.4s ease-out 0.4s infinite; }
    #mic-btn.listening .ring:nth-child(3) { animation: ring-out 1.4s ease-out 0.8s infinite; }
    @keyframes ring-out {
      0%   { inset: -4px;  opacity: 0.6; }
      100% { inset: -28px; opacity: 0;   }
    }
    #mic-btn svg { transition: all 0.3s ease; }

    /* WAVEFORM */
    #waveform {
      display: flex;
      align-items: center;
      gap: 4px;
      height: 32px;
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    #waveform.active { opacity: 1; }
    #waveform .bar { width: 4px; border-radius: 2px; background: var(--danger); }
    #waveform.active .bar { animation: wave-bounce 0.8s ease-in-out infinite alternate; }
    #waveform .bar:nth-child(1) { animation-delay: 0s;    }
    #waveform .bar:nth-child(2) { animation-delay: 0.1s;  }
    #waveform .bar:nth-child(3) { animation-delay: 0.2s;  }
    #waveform .bar:nth-child(4) { animation-delay: 0.05s; }
    #waveform .bar:nth-child(5) { animation-delay: 0.15s; }
    #waveform .bar:nth-child(6) { animation-delay: 0.25s; }
    #waveform .bar:nth-child(7) { animation-delay: 0s;    }
    #waveform .bar:nth-child(8) { animation-delay: 0.12s; }
    @keyframes wave-bounce { from { height: 4px; } to { height: 28px; } }

    #status {
      font-size: 0.82rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      min-height: 1.2em;
      text-align: center;
      transition: color 0.3s ease;
    }
    #status.listening { color: var(--danger);  }
    #status.searching { color: var(--accent2); }
    #status.playing   { color: var(--success); }
    #status.error     { color: var(--danger);  }

    #transcript {
      background: var(--card);
      border: 1px solid rgba(0,229,255,0.1);
      border-radius: 12px;
      padding: 10px 20px;
      font-size: 0.85rem;
      color: var(--text);
      min-height: 38px;
      min-width: 200px;
      max-width: 100%;
      text-align: center;
      opacity: 0;
      transform: translateY(6px);
      transition: all 0.3s ease;
      width: 100%;
    }
    #transcript.visible { opacity: 1; transform: translateY(0); }

    /* ── API KEY SETUP ── */
    #api-setup {
      background: var(--card);
      border: 1px solid rgba(0,229,255,0.15);
      border-radius: 14px;
      padding: 20px 24px;
      width: 100%;
      display: none;
      flex-direction: column;
      gap: 12px;
    }
    #api-setup.visible { display: flex; }
    #api-setup p { font-size: 0.8rem; color: var(--muted); line-height: 1.6; }
    #api-setup a { color: var(--accent); text-decoration: none; }
    #api-setup a:hover { text-decoration: underline; }

    .api-row { display: flex; gap: 10px; }
    #api-key-input {
      flex: 1;
      background: #0c1220;
      border: 1px solid rgba(0,229,255,0.2);
      border-radius: 8px;
      padding: 10px 14px;
      color: var(--text);
      font-family: 'Sora', sans-serif;
      font-size: 0.82rem;
      outline: none;
      transition: border-color 0.2s;
    }
    #api-key-input:focus { border-color: var(--accent); }
    #api-key-input::placeholder { color: var(--muted); }

    #save-key-btn {
      background: var(--accent);
      border: none;
      border-radius: 8px;
      padding: 10px 20px;
      color: var(--bg);
      font-family: 'Orbitron', sans-serif;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    #save-key-btn:hover { opacity: 0.85; }

    #toggle-setup {
      font-size: 0.72rem;
      color: var(--muted);
      text-align: center;
      cursor: pointer;
      text-decoration: underline;
      text-underline-offset: 3px;
      transition: color 0.2s;
    }
    #toggle-setup:hover { color: var(--text); }

    @media (max-width: 480px) {
      #video-wrap { border-radius: 10px; }
      .api-row { flex-direction: column; }
    }
  </style>
</head>
<body>

  <!-- ACTIVATE OVERLAY -->
  <div id="activate-screen">
    <div class="activate-logo">NKT JustSay</div>
    <p class="activate-sub">Voice → Song → Instant Play</p>
    <button id="tap-btn" onclick="activateSession()">
      <span>▶ &nbsp;LET ME IN</span>
    </button>
  </div>

  <!-- HEADER -->
  <header>
    <h1>NKT JustSay</h1>
    <p>Say a song · It plays</p>
  </header>

  <!-- MAIN -->
  <div id="main">

    <div id="video-wrap"></div>
    <div id="now-playing"></div>

    <div class="controls">
      <div id="waveform">
        <div class="bar"></div><div class="bar"></div><div class="bar"></div>
        <div class="bar"></div><div class="bar"></div><div class="bar"></div>
        <div class="bar"></div><div class="bar"></div>
      </div>

      <button id="mic-btn" onclick="toggleListen()" title="Start Listening">
        <div class="ring"></div><div class="ring"></div><div class="ring"></div>
        <svg id="mic-icon" width="32" height="32" viewBox="0 0 24 24" fill="none">
          <rect x="9" y="2" width="6" height="11" rx="3" fill="#00e5ff"/>
          <path d="M5 10a7 7 0 0 0 14 0" stroke="#00e5ff" stroke-width="2" stroke-linecap="round"/>
          <line x1="12" y1="17" x2="12" y2="21" stroke="#00e5ff" stroke-width="2" stroke-linecap="round"/>
          <line x1="9" y1="21" x2="15" y2="21" stroke="#00e5ff" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </button>

      <div id="status">Press mic and say a song name</div>
      <div id="transcript"></div>
    </div>

    <!-- API KEY SETUP (shown if Piped also fails) -->
    <div id="api-setup">
      <p>
        Search servers are unreachable from your network.<br>
        Enter a free <a href="https://console.cloud.google.com/apis/library/youtube.googleapis.com" target="_blank">YouTube Data API v3 key</a> to use as backup
        (10,000 free searches/day — takes ~2 min to set up).
      </p>
      <div class="api-row">
        <input id="api-key-input" type="text" placeholder="Paste your YouTube API key here" />
        <button id="save-key-btn" onclick="saveApiKey()">SAVE</button>
      </div>
    </div>
    <div id="toggle-setup" onclick="toggleSetup()" style="display:none">⚙ Use my own YouTube API key</div>

  </div>

  <script>
    // ─────────────────────────────────────────────────────────────────────────
    // SEARCH STRATEGY
    //   1. Piped API (open, CORS-friendly, no key needed) — multiple instances
    //   2. YouTube Data API v3 (if user supplied a key)
    //   Playback: always via Invidious embed (ad-free)
    // ─────────────────────────────────────────────────────────────────────────

    const PIPED_INSTANCES = [
      'https://pipedapi.kavin.rocks',
      'https://pipedapi.adminforge.de',
      'https://api.piped.projectsegfau.lt',
      'https://piped-api.garudalinux.org',
      'https://watchapi.whatever.social',
    ];

    // Invidious instances used only for the embed player (not for API calls)
    const INVIDIOUS_EMBED = [
      'https://invidious.lunar.icu',
      'https://yewtu.be',
      'https://inv.nadeko.net',
    ];

    let sessionActive = false;
    let recognition   = null;
    let isListening   = false;
    let youtubeApiKey = '';
    let embedInstance = INVIDIOUS_EMBED[0];

    // ── SESSION ──────────────────────────────────────────────────────────────
    function activateSession() {
      sessionActive = true;
      const s = document.getElementById('activate-screen');
      s.classList.add('hidden');
      setTimeout(() => s.style.display = 'none', 500);
      // Warm up: probe Invidious embed instance
      probeEmbedInstance();
      // Show the API key toggle
      document.getElementById('toggle-setup').style.display = 'block';
    }

    // Pick the first Invidious instance that responds (for embeds)
    async function probeEmbedInstance() {
      for (const inst of INVIDIOUS_EMBED) {
        try {
          const r = await fetchWithTimeout(`${inst}/api/v1/stats`, 4000);
          if (r.ok) { embedInstance = inst; return; }
        } catch(_) {}
      }
    }

    // ── SPEECH RECOGNITION ───────────────────────────────────────────────────
    function setupRecognition() {
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SR) {
        setStatus('Speech recognition not supported — use Chrome or Edge', 'error');
        return null;
      }
      const r         = new SR();
      r.lang            = 'en-US';
      r.continuous      = false;
      r.interimResults  = true;
      r.maxAlternatives = 1;

      r.onstart = () => {
        isListening = true;
        setMicState(true);
        setStatus('Listening… speak a song name', 'listening');
        showTranscript('', true);
      };
      r.onresult = (e) => {
        const interim = Array.from(e.results).map(x => x[0].transcript).join('');
        showTranscript(interim, true);
        if (e.results[e.results.length - 1].isFinal) {
          const q = e.results[e.results.length - 1][0].transcript.trim();
          showTranscript(q, true);
          handleQuery(q);
        }
      };
      r.onerror = (e) => {
        isListening = false;
        setMicState(false);
        const msgs = {
          'no-speech':   'No speech detected — try again',
          'not-allowed': 'Microphone blocked — allow access in browser settings',
          'network':     'Network error during recognition',
        };
        setStatus(msgs[e.error] || `Mic error: ${e.error}`, 'error');
      };
      r.onend = () => { isListening = false; setMicState(false); };
      return r;
    }

    function toggleListen() {
      if (!sessionActive) return;
      if (isListening) { recognition && recognition.stop(); return; }
      recognition = setupRecognition();
      if (!recognition) return;
      try { recognition.start(); }
      catch (err) { setStatus('Could not start mic: ' + err.message, 'error'); }
    }

    // ── SEARCH ───────────────────────────────────────────────────────────────
    async function handleQuery(query) {
      if (!query) return;
      setStatus(`Searching for "${query}"…`, 'searching');
      try {
        const result = await searchVideo(query);
        playVideo(result.videoId, result.title);
      } catch (err) {
        console.error(err);
        setStatus('Search servers unreachable — see setup below', 'error');
        document.getElementById('api-setup').classList.add('visible');
      }
    }

    async function searchVideo(query) {
      // ── Try Piped first (no API key needed, CORS allowed) ──
      for (const base of PIPED_INSTANCES) {
        try {
          const url = `${base}/search?q=${encodeURIComponent(query)}&filter=videos`;
          const res = await fetchWithTimeout(url, 7000);
          if (!res.ok) { console.warn(base, res.status); continue; }
          const data = await res.json();
          const items = (data.items || []).filter(i => i.type === 'stream' || i.url);
          if (items.length > 0) {
            const item = items[0];
            // Piped returns url like "/watch?v=VIDEO_ID"
            const videoId = (item.url || '').replace('/watch?v=', '').split('&')[0]
                         || item.videoId;
            if (videoId) return { videoId, title: item.title };
          }
        } catch (e) {
          console.warn(`Piped ${base} failed:`, e.message);
        }
      }

      // ── Fallback: YouTube Data API v3 (if user provided key) ──
      if (youtubeApiKey) {
        return await searchYouTubeAPI(query);
      }

      throw new Error('All search methods exhausted');
    }

    async function searchYouTubeAPI(query) {
      const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&maxResults=1&q=${encodeURIComponent(query)}&key=${youtubeApiKey}`;
      const res = await fetchWithTimeout(url, 8000);
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err?.error?.message || `YouTube API error ${res.status}`);
      }
      const data = await res.json();
      if (!data.items || data.items.length === 0) throw new Error('No results');
      const item = data.items[0];
      return {
        videoId: item.id.videoId,
        title:   item.snippet.title,
      };
    }

    // ── PLAY VIDEO ───────────────────────────────────────────────────────────
    function playVideo(videoId, title) {
      const wrap = document.getElementById('video-wrap');
      const old  = wrap.querySelector('iframe');
      if (old) old.remove();

      // Invidious embed = ad-free player
      const iframe = document.createElement('iframe');
      iframe.src             = `${embedInstance}/embed/${videoId}?autoplay=1&listen=0&quality=hd720`;
      iframe.allow           = 'autoplay; fullscreen; picture-in-picture';
      iframe.allowFullscreen = true;
      iframe.title           = title || 'Video';

      wrap.appendChild(iframe);
      wrap.classList.add('active');

      setStatus('Now playing', 'playing');
      showNowPlaying(title || videoId);
      showTranscript('', false);
    }

    // ── API KEY SETUP ─────────────────────────────────────────────────────────
    function saveApiKey() {
      const val = document.getElementById('api-key-input').value.trim();
      if (!val) return;
      youtubeApiKey = val;
      document.getElementById('api-setup').classList.remove('visible');
      setStatus('API key saved — try the mic again', 'playing');
    }

    function toggleSetup() {
      const el = document.getElementById('api-setup');
      el.classList.toggle('visible');
    }

    // ── HELPERS ───────────────────────────────────────────────────────────────
    function fetchWithTimeout(url, ms) {
      const ctrl = new AbortController();
      const id   = setTimeout(() => ctrl.abort(), ms);
      return fetch(url, { signal: ctrl.signal })
        .then(res  => { clearTimeout(id); return res; })
        .catch(err => { clearTimeout(id); throw err;  });
    }

    function setMicState(on) {
      const btn  = document.getElementById('mic-btn');
      const icon = document.getElementById('mic-icon');
      const wave = document.getElementById('waveform');
      if (on) {
        btn.classList.add('listening');
        wave.classList.add('active');
        icon.innerHTML = `
          <rect x="8" y="8" width="8" height="8" rx="2" fill="#ff4f6a"/>
          <circle cx="12" cy="12" r="10" stroke="#ff4f6a" stroke-width="2"/>`;
      } else {
        btn.classList.remove('listening');
        wave.classList.remove('active');
        icon.innerHTML = `
          <rect x="9" y="2" width="6" height="11" rx="3" fill="#00e5ff"/>
          <path d="M5 10a7 7 0 0 0 14 0" stroke="#00e5ff" stroke-width="2" stroke-linecap="round"/>
          <line x1="12" y1="17" x2="12" y2="21" stroke="#00e5ff" stroke-width="2" stroke-linecap="round"/>
          <line x1="9" y1="21" x2="15" y2="21" stroke="#00e5ff" stroke-width="2" stroke-linecap="round"/>`;
      }
    }

    function setStatus(msg, type = '') {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.className   = type;
    }

    function showTranscript(text, show) {
      const el = document.getElementById('transcript');
      if (show) { el.classList.add('visible'); el.textContent = text || '…'; }
      else       { el.classList.remove('visible'); el.textContent = ''; }
    }

    function showNowPlaying(title) {
      const el = document.getElementById('now-playing');
      el.textContent = '▶ ' + title;
      el.classList.add('visible');
    }

    document.addEventListener('keydown', (e) => {
      if (e.code === 'Space' && e.target.tagName !== 'BUTTON' && e.target.tagName !== 'INPUT') {
        e.preventDefault();
        toggleListen();
      }
    });
  </script>
</body>
</html>
